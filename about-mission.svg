<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="420" height="320">
  <defs>
    <filter id="sd"><feDropShadow dx="0" dy="5" stdDeviation="12" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="420" height="320" rx="16" fill="#eff6ff"/>

  <!-- Main illustration: student at laptop with resume on screen -->
  <!-- Desk surface -->
  <rect x="30" y="230" width="360" height="14" rx="4" fill="#e2e8f0"/>

  <!-- Laptop body -->
  <rect x="100" y="130" width="220" height="140" rx="8" fill="#334155" filter="url(#sd)"/>
  <!-- Screen -->
  <rect x="110" y="140" width="200" height="115" rx="5" fill="#f8fafc"/>
  <!-- Resume on screen -->
  <rect x="120" y="148" width="180" height="4" rx="2" fill="#1a56db"/>
  <rect x="120" y="157" width="110" height="7" rx="2" fill="#1e3560"/>
  <rect x="120" y="169" width="80" height="5" rx="2" fill="#1a56db" opacity="0.6"/>
  <rect x="120" y="180" width="180" height="1" fill="#e2e8f0"/>
  <rect x="120" y="186" width="55" height="5" rx="2" fill="#1a56db"/>
  <rect x="120" y="196" width="180" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="120" y="204" width="150" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="120" y="214" width="55" height="5" rx="2" fill="#1a56db"/>
  <rect x="120" y="224" width="180" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="120" y="234" width="130" height="4" rx="2" fill="#cbd5e1"/>
  <!-- Laptop hinge -->
  <rect x="100" y="266" width="220" height="8" rx="2" fill="#475569"/>
  <!-- Laptop base -->
  <rect x="90" y="272" width="240" height="10" rx="4" fill="#334155"/>

  <!-- Student figure (simple) -->
  <!-- Head -->
  <circle cx="70" cy="160" r="22" fill="#fde68a"/>
  <!-- Hair -->
  <ellipse cx="70" cy="143" rx="22" ry="12" fill="#92400e"/>
  <!-- Face: eyes and smile -->
  <circle cx="63" cy="160" r="3" fill="#334155"/>
  <circle cx="77" cy="160" r="3" fill="#334155"/>
  <path d="M63 170 Q70 177 77 170" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="44" y="182" width="52" height="70" rx="10" fill="#1a56db"/>
  <!-- Arms -->
  <rect x="24" y="188" width="22" height="12" rx="6" fill="#fde68a"/>
  <rect x="96" y="188" width="22" height="12" rx="6" fill="#fde68a"/>

  <!-- Floating elements around -->
  <!-- Star 1 -->
  <text x="30" y="100" font-family="sans-serif" font-size="20">⭐</text>
  <!-- Checkmark bubble -->
  <circle cx="360" cy="100" r="20" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="360" y="107" font-family="sans-serif" font-size="16" text-anchor="middle">✓</text>
  <!-- Trophy -->
  <text x="360" y="200" font-family="sans-serif" font-size="26">🏆</text>
  <!-- Rocket -->
  <text x="30" y="210" font-family="sans-serif" font-size="22">🚀</text>

  <!-- Stats bar at bottom -->
  <rect x="30" y="292" width="360" height="20" rx="8" fill="rgba(26,86,219,0.08)"/>
  <rect x="44" y="298" width="70" height="8" rx="3" fill="#1a56db"/>
  <rect x="126" y="298" width="1" height="8" fill="#bfdbfe"/>
  <rect x="140" y="298" width="60" height="8" rx="3" fill="#1a56db"/>
  <rect x="212" y="298" width="1" height="8" fill="#bfdbfe"/>
  <rect x="226" y="298" width="50" height="8" rx="3" fill="#1a56db"/>
  <rect x="288" y="298" width="1" height="8" fill="#bfdbfe"/>
  <rect x="302" y="298" width="55" height="8" rx="3" fill="#1a56db"/>
</svg>
