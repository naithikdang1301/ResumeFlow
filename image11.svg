  <rect x="30" y="274" width="62" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="100" y="274" width="56" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="164" y="274" width="70" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="242" y="274" width="48" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="30" y="302" width="66" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="104" y="302" width="58" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
