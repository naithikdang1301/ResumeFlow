  <circle cx="36" cy="84" r="5" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="48" y="80" width="70" height="7" rx="2" fill="#94a3b8"/>
  <circle cx="130" cy="84" r="5" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
