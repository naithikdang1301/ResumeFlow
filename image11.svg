  <rect x="30" y="191" width="280" height="46" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="44" y="200" width="180" height="8" rx="2" fill="#334155"/>
  <rect x="236" y="200" width="62" height="8" rx="2" fill="#94a3b8"/>
  <rect x="44" y="214" width="130" height="6" rx="2" fill="#94a3b8"/>
  <rect x="44" y="225" width="100" height="6" rx="2" fill="#94a3b8"/>
  <rect x="30" y="248" width="280" height="1.5" fill="#fed7aa"/>
  <!-- Section: Skills -->
  <rect x="30" y="258" width="55" height="9" rx="2" fill="#ea580c"/>
