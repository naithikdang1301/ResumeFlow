  <rect x="44" y="370" width="170" height="8" rx="2" fill="#334155"/>
  <rect x="44" y="384" width="252" height="6" rx="2" fill="#94a3b8"/>
  <rect x="30" y="406" width="280" height="36" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="44" y="414" width="150" height="8" rx="2" fill="#334155"/>
  <rect x="44" y="428" width="252" height="6" rx="2" fill="#94a3b8"/>
