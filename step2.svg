  <rect x="22" y="62" width="48" height="5" rx="2" fill="#e2e8f0"/>
  <rect x="22" y="72" width="36" height="5" rx="2" fill="#e2e8f0"/>
  <!-- Card 2 (selected — glowing) -->
  <rect x="88" y="14" width="66" height="132" rx="8" fill="#ffffff" stroke="#1a56db" stroke-width="3"/>
