<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#f0fdf4"/>
  <!-- Three template cards side by side -->
  <!-- Card 1 (greyed out) -->
  <rect x="16" y="22" width="62" height="116" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
