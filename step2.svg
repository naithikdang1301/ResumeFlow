  <circle cx="121" cy="14" r="10" fill="#1a56db"/>
  <text x="121" y="18" font-family="sans-serif" font-size="11" text-anchor="middle" fill="white">✓</text>
  <rect x="88" y="14" width="66" height="14" rx="4" fill="#1a56db"/>
  <rect x="96" y="36" width="52" height="6" rx="2" fill="#1e3560"/>
  <rect x="96" y="47" width="42" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="96" y="57" width="48" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="96" y="67" width="38" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="96" y="77" width="44" height="5" rx="2" fill="#1a56db" opacity="0.4"/>
  <rect x="96" y="87" width="52" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="96" y="97" width="40" height="5" rx="2" fill="#cbd5e1"/>
  <!-- Card 3 (greyed out) -->
  <rect x="164" y="22" width="62" height="116" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="164" y="22" width="62" height="12" rx="4" fill="#334155"/>
  <rect x="170" y="42" width="50" height="5" rx="2" fill="#e2e8f0"/>
  <rect x="170" y="52" width="42" height="5" rx="2" fill="#e2e8f0"/>
