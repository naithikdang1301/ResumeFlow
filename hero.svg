<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <!-- Background -->
  <rect width="500" height="380" rx="18" fill="#f8faff"/>
  <!-- Main resume sheet -->
  <rect x="50" y="20" width="250" height="340" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Blue top bar -->
  <rect x="50" y="20" width="250" height="10" rx="5" fill="#1a56db"/>
  <rect x="50" y="25" width="250" height="5" fill="#1a56db"/>
  <!-- Name line -->
  <rect x="70" y="48" width="140" height="14" rx="3" fill="#1e3560"/>
  <!-- Job title -->
  <rect x="70" y="68" width="100" height="8" rx="2" fill="#1a56db" opacity="0.7"/>
  <!-- Contact row -->
  <rect x="70" y="84" width="60" height="6" rx="2" fill="#94a3b8"/>
  <rect x="138" y="84" width="60" height="6" rx="2" fill="#94a3b8"/>
  <rect x="206" y="84" width="54" height="6" rx="2" fill="#94a3b8"/>
  <!-- Divider -->
  <rect x="70" y="99" width="210" height="1.5" fill="#1a56db" opacity="0.3"/>
  <!-- Objective -->
  <rect x="70" y="108" width="70" height="7" rx="2" fill="#1a56db"/>
  <rect x="70" y="121" width="210" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="70" y="131" width="190" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="70" y="141" width="200" height="5" rx="2" fill="#cbd5e1"/>
  <!-- Divider -->
  <rect x="70" y="154" width="210" height="1.5" fill="#e2e8f0"/>
  <!-- Education -->
  <rect x="70" y="163" width="60" height="7" rx="2" fill="#1a56db"/>
  <rect x="70" y="176" width="150" height="6" rx="2" fill="#334155"/>
  <rect x="70" y="188" width="110" height="5" rx="2" fill="#94a3b8"/>
  <rect x="70" y="198" width="90" height="5" rx="2" fill="#94a3b8"/>
  <!-- Divider -->
  <rect x="70" y="212" width="210" height="1.5" fill="#e2e8f0"/>
  <!-- Skills -->
  <rect x="70" y="221" width="42" height="7" rx="2" fill="#1a56db"/>
  <rect x="70" y="234" width="50" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="128" y="234" width="44" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="180" y="234" width="56" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="70" y="258" width="48" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="126" y="258" width="52" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <!-- Divider -->
  <rect x="70" y="284" width="210" height="1.5" fill="#e2e8f0"/>
  <!-- Projects -->
  <rect x="70" y="293" width="52" height="7" rx="2" fill="#1a56db"/>
  <rect x="70" y="306" width="150" height="6" rx="2" fill="#334155"/>
  <rect x="70" y="317" width="210" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="70" y="327" width="180" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="70" y="337" width="195" height="5" rx="2" fill="#cbd5e1"/>

  <!-- Floating score card (right side) -->
  <rect x="320" y="40" width="150" height="80" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a56db" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Score ring -->
  <circle cx="356" cy="80" r="24" fill="none" stroke="#e2e8f0" stroke-width="5"/>
  <circle cx="356" cy="80" r="24" fill="none" stroke="#16a34a" stroke-width="5" stroke-dasharray="126 151" stroke-dashoffset="38" stroke-linecap="round"/>
  <text x="356" y="77" font-family="'Playfair Display',serif" font-size="13" font-weight="700" text-anchor="middle" fill="#16a34a">95%</text>
  <text x="356" y="89" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#94a3b8">ATS</text>
  <!-- Score label -->
  <text x="400" y="72" font-family="sans-serif" font-size="11" font-weight="700" fill="#1e3560">ATS Score</text>
  <text x="400" y="85" font-family="sans-serif" font-size="9" fill="#94a3b8">Excellent match</text>
  <text x="400" y="97" font-family="sans-serif" font-size="9" fill="#16a34a">✓ Ready to apply</text>

  <!-- Floating tip card -->
  <rect x="320" y="140" width="150" height="70" rx="14" fill="#1a56db" filter="url(#sh2)"/>
  <defs>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a56db" flood-opacity="0.25"/>
    </filter>
  </defs>
  <text x="340" y="162" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">USED BY STUDENTS AT</text>
  <rect x="332" y="170" width="55" height="7" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="332" y="182" width="48" height="7" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="332" y="194" width="60" height="7" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="398" y="170" width="55" height="7" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="398" y="182" width="48" height="7" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="398" y="194" width="52" height="7" rx="2" fill="rgba(255,255,255,0.6)"/>

  <!-- Floating download badge -->
  <rect x="320" y="230" width="150" height="50" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="344" y="252" font-family="sans-serif" font-size="18">⬇️</text>
  <text x="374" y="250" font-family="sans-serif" font-size="11" font-weight="700" fill="#15803d">Download</text>
  <text x="374" y="263" font-family="sans-serif" font-size="9" fill="#94a3b8">PDF · Word · HTML</text>

  <!-- Floating templates badge -->
  <rect x="320" y="300" width="150" height="50" rx="14" fill="#fef9c3" stroke="#fde68a" stroke-width="1.5"/>
  <text x="344" y="322" font-family="sans-serif" font-size="18">🎨</text>
  <text x="374" y="320" font-family="sans-serif" font-size="11" font-weight="700" fill="#854d0e">6 Templates</text>
  <text x="374" y="333" font-family="sans-serif" font-size="9" fill="#94a3b8">All ATS-approved</text>
</svg>
